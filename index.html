};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const DB_PATH = 'tcrest/data';

let syncStatus = 'ok';
let isSyncing = false;

async function saveShared(data) {
  try {
    syncStatus = 'syncing'; renderHeader();
    await set(ref(db, DB_PATH), data);
    syncStatus = 'ok'; renderHeader();
    return true;
  } catch(e) {
    syncStatus = 'error'; renderHeader();
    return false;
  }
}

function startRealtimeSync() {
  onValue(ref(db, DB_PATH), (snapshot) => {
    const remote = snapshot.val();
    if (!remote) {
      // : Firebase
      saveShared(getSharedData());
      return;
    }
    // 
    if (!isSyncing) {
      applySharedData(remote);
      render();
    }
  });
}

async function syncToShared() {
  isSyncing = true;
  await saveShared(getSharedData());
  isSyncing = false;
}

// TRANSLATE
// -------------------------------------------------------------
async function translateToEn(jaText) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:200,
        system:'Translate the Japanese construction/site management text to concise English. Return ONLY the translated text, no explanation, no quotes.',
        messages:[{role:'user',content:jaText}]
      })
    });
    const data = await res.json();
    return data?.content?.[0]?.text?.trim() || jaText;
  } catch(e){ return jaText; }
}

function siteColor(s) { const lbl=sl(s); return STATUS_COLOR[lbl]||STATUS_COLOR[s]||'#64748b'; }
function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function siteById(id) { return state.sites.find(s=>s.id===id); }
function toolById(id) { return state.tools.find(t=>t.id===id); }
function nameDisplay(obj) {
  if (!obj) return '';
  if (state.lang==='en') return obj.translating ? `<span class="translating">🔄 ${t().translating}<\/span>` : esc(obj.nameEn||obj.name);
  return esc(obj.name);
}
function textDisplay(obj) {
  if (!obj) return '';
  if (state.lang==='en') return obj.translating ? `<span class="translating">🔄 ${t().translating}<\/span>` : esc(obj.textEn||obj.text);
  return esc(obj.text);
}
function noticeDisplay(n) {
  if (state.lang==='en') return n.translating ? `<span class="translating">🔄 ${t().translating}<\/span>` : esc(n.textEn||n.text);
  return esc(n.text);
}

function renderDashboard() {
  const allTasks = state.sites.flatMap(s=>s.tasks);
  const done = allTasks.filter(tk=>tk.done).length;
  const cards = [
    {label:t().activeSites, value:state.sites.filter(s=>s.status==='進行中').length, color:'#f59e0b', icon:'🏗️'},
    {label:t().taskProgress, value:`${done}/${allTasks.length}`, color:'#22c55e', icon:'✅'},
    {label:t().toolsInUse, value:`${state.tools.length}${t().kinds}`, color:'#f97316', icon:'🔧'},
  ];
  return `
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;">
    ${cards.map(c=>`
    <div style="background:linear-gradient(135deg,#1e2235,#161926);border:1px solid ${c.color}33; border-top:3px solid ${c.color};border-radius:10px;padding:14px 12px;text-align:center;">
      <div style="font-size:22px;">${c.icon}<\/div>
      <div style="font-size:22px;font-weight:900;color:${c.color};line-height:1.2;">${c.value}<\/div>
      <div style="font-size:11px;color:#94a3b8;margin-top:2px;">${c.label}<\/div>
    <\/div>`).join('')}
  <\/div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <h2 class="section-title">${t().siteList}<\/h2>
    <button class="btn-secondary" onclick="openModal('addSite')">${t().addSite}<\/button>
  <\/div>
  ${state.sites.map(s=>renderSiteCard(s,true)).join('')}
  <div style="display:flex;justify-content:space-between;align-items:center;margin:20px 0 10px;">
    <h2 class="section-title">${t().notices}<\/h2>
  <\/div>
  <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">
    <div style="position:relative;flex-shrink:0;">
      <input id="sender-name-input" value="${esc(state.senderName)}" placeholder="${t().senderNamePh}"
        oninput="saveSenderName(this.value)"
        style="width:90px;background:#1e2235;border:1px solid ${state.senderName?'#f59e0b44':'#334155'}; border-radius:8px;padding:10px 10px;color:#e8eaf0;font-size:13px;outline:none;">
      <div style="position:absolute;top:-8px;left:6px;font-size:10px;background:#0f1117;padding:0 3px;color:#64748b;">${t().senderName}<\/div>
    <\/div>
    <input id="notice-input" placeholder="${t().noticePh}"
      onkeydown="if(event.key==='Enter')submitNotice()" style="flex:1;">
    <button id="notice-send-btn" class="btn-primary" onclick="submitNotice()" style="opacity:${state.senderName?'1':'0.5'};cursor:${state.senderName?'pointer':'not-allowed'};">${t().send}<\/button>
  <\/div>
  <div id="sender-warn" style="font-size:11px;color:#f59e0b;margin-bottom:8px;display:${state.senderName?'none':'block'};">
    ⚠️ ${state.lang==='en'?'Please enter your name first':'名前を入力してから送信できます'}
  <\/div>
  ${[...state.notices].sort((a,b)=>(b.important?1:0)-(a.important?1:0)).map(n=>`
  <div style="background:${n.important?'#2d1f0a':'#1a1d2e'};border:1px solid ${n.important?'#f59e0b44':'#ffffff11'}; border-radius:8px;padding:10px 14px;margin-bottom:8px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:12px;font-weight:700;color:${n.important?'#f59e0b':'#94a3b8'};">${n.important?'📌 ':''}${esc(n.from)}<\/span>
        ${n.important?`<span style="font-size:10px;background:#f59e0b22;color:#f59e0b;padding:1px 6px;border-radius:10px;">${t().pinned}<\/span>`:''}
      <\/div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:11px;color:#475569;">${esc(n.time)}<\/span>
        <button onclick="toggleNoticePin(${n.id})" title="${n.important?t().unpin:t().pin}"
          style="background:none;border:1px solid ${n.important?'#f59e0b44':'#334155'};border-radius:5px; color:${n.important?'#f59e0b':'#475569'};cursor:pointer;font-size:12px;padding:2px 6px;white-space:nowrap;">
          ${n.important?'📌':'📍'}
        <\/button>
        ${n.important
          ? `<button title="${state.lang==='en'?'Unpin to delete':'固定解除してから削除できます'}"
              style="background:none;border:1px solid #334155;border-radius:5px; color:#334155;cursor:not-allowed;font-size:12px;padding:2px 6px;opacity:0.4;">🗑<\/button>`
          : state.confirmDeleteNotice===n.id
            ? `<span style="display:flex;align-items:center;gap:4px;">
                <span style="font-size:11px;color:#fca5a5;">${state.lang==='en'?'Delete?':'削除しますか？'}<\/span>
                <button onclick="deleteNotice(${n.id})"
                  style="background:#ef4444;border:none;border-radius:5px;color:#fff;cursor:pointer;font-size:11px;padding:2px 8px;font-weight:700;">
                  ${state.lang==='en'?'Yes':'はい'}<\/button>
                <button onclick="setConfirmDeleteNotice(null)"
                  style="background:none;border:1px solid #334155;border-radius:5px;color:#94a3b8;cursor:pointer;font-size:11px;padding:2px 8px;">
                  ${state.lang==='en'?'No':'いいえ'}<\/button>
              <\/span>`
            : `<button onclick="setConfirmDeleteNotice(${n.id})" title="${t().delNotice}"
                style="background:none;border:1px solid #ef444433;border-radius:5px; color:#ef4444;cursor:pointer;font-size:12px;padding:2px 6px;">🗑<\/button>`
        }
      <\/div>
    <\/div>
    ${state.editingNotice===n.id
      ? `<div style="display:flex;gap:6px;margin-top:6px;">
          <input id="edit-notice-input-${n.id}" value="${esc(n.text)}" style="flex:1;padding:6px 10px;font-size:13px;" onkeydown="if(event.key==='Enter')saveNoticeEdit(${n.id});if(event.key==='Escape'){state.editingNotice=null;render();}">
          <button onclick="saveNoticeEdit(${n.id})" style="background:#f59e0b;border:none;border-radius:6px;color:#0f1117;cursor:pointer;font-size:11px;padding:4px 10px;font-weight:700;">${t().save}<\/button>
          <button onclick="cancelNoticeEdit()" style="background:none;border:1px solid #334155;border-radius:6px;color:#94a3b8;cursor:pointer;font-size:11px;padding:4px 8px;">${t().cancel}<\/button>
        <\/div>`
      : `<div style="font-size:14px;">${noticeDisplay(n)}<\/div>`
    }
  <\/div>`).join('')}`;
}

function renderSiteCard(site, clickable=false) {
  const prog = site.tasks.length ? Math.round(site.tasks.filter(tk=>tk.done).length/site.tasks.length*100) : 0;
  const color = siteColor(site.status);
  const label = sl(site.status);
  const nameHtml = state.lang==='en'
    ? (site.translating ? `<span class="translating">🔄 ${t().translating}<\/span>` : esc(site.nameEn||site.name))
    : esc(site.name);
  const onclick = clickable ? `onclick="openSite(${site.id})"` : `onclick="openSite(${site.id})"`;
  return `
  <div class="card" style="border-left:4px solid ${color};cursor:pointer;" ${onclick}>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <div style="flex:1;margin-right:8px;">
        <div style="font-weight:700;font-size:15px;">${nameHtml}<\/div>
        <div style="font-size:12px;color:#64748b;margin-top:2px;">📍 ${esc(site.location)}<\/div>
      <\/div>
      <span class="chip" style="background:${color}22;color:${color};border:1px solid ${color}44;">${esc(label)}<\/span>
    <\/div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:8px;">
      <span>📅 ${esc(site.startDate)} – ${esc(site.endDate)}<\/span>
      <span>${site.tasks.filter(tk=>tk.done).length}/${site.tasks.length} ${t().done}</span>
    <\/div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${prog}%;background:linear-gradient(90deg,${color},${color}aa);"><\/div>
    <\/div>
    <div style="display:flex;justify-content:flex-end;margin-top:8px;" onclick="event.stopPropagation()">
      <button onclick="openEditSite(${site.id})" style="background:transparent;border:1px solid #334155;border-radius:6px; color:#64748b;cursor:pointer;font-size:11px;padding:3px 10px;">✏️ ${state.lang==='en'?'Edit':'編集'}<\/button>
    <\/div>
  <\/div>`;
}

function renderSites() {
  if (!state.selectedSite) return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 class="section-title">${t().sitesMgmt}<\/h2>
      <button class="btn-primary" onclick="openModal('addSite')">${t().addSite}<\/button>
    <\/div>
    <div style="display:flex;background:#1a1d2e;border-radius:10px;padding:4px;margin-bottom:14px;gap:4px;">
      <button class="subtab-btn ${state.siteView==='gantt'?'active':''}" onclick="setSiteView('gantt')">
        📅 ${t().gantt}
      <\/button>
      <button class="subtab-btn ${state.siteView==='list'?'active':''}" onclick="setSiteView('list')">
        📋 ${t().list}
      <\/button>
    <\/div>
    ${state.siteView==='gantt' ? renderGantt() : state.sites.map(s=>renderSiteCard(s)).join('')}`;
  const site = siteById(state.selectedSite);
  if (!site) return '';
  return renderSiteDetail(site);
}

function renderGantt() {
  if (!state.sites.length) return `<div class="empty-state"><div style="font-size:30px;margin-bottom:8px;">📅<\/div><div style="color:#64748b;font-size:13px;">${t().addSite}から現場を追加してください</div><\/div>`;

  // : start/end 
  const today = new Date(); today.setHours(0,0,0,0);
  let minD = new Date(today); let maxD = new Date(today);
  state.sites.forEach(s => {
    if (s.startDate) { const d=new Date(s.startDate); if(d<minD) minD=d; }
    if (s.endDate)   { const d=new Date(s.endDate);   if(d>maxD) maxD=d; }
  });
  //  + 1
  minD = new Date(minD); minD.setDate(minD.getDate()-7);
  maxD = new Date(maxD); maxD.setDate(maxD.getDate()+7);
  // 
  const days = [];
  for (let d=new Date(minD); d<=maxD; d.setDate(d.getDate()+1)) days.push(new Date(d));
  const totalDays = days.length;

  // ()
  const monthLabels = {}; // col index  month label
  days.forEach((d,i) => { if(d.getDate()===1) monthLabels[i]=`${d.getMonth()+1}月`; });

  const headCells = days.map((d,i) => {
    const isToday = d.getTime()===today.getTime();
    const isFirst = d.getDate()===1;
    const cls = `gantt-day-head${isToday?' today':''}${isFirst?' month-start':''}`;
    const label = isFirst ? `${d.getMonth()+1}/${d.getDate()}` : (d.getDate()%5===0?`${d.getDate()}`:'');
    return `<th class="${cls}">${label}<\/th>`;
  }).join('');

  // 
  const rows = state.sites.map(site => {
    const color = siteColor(site.status);
    const nameHtml = state.lang==='en'
      ? (site.translating?`…`:esc(site.nameEn||site.name))
      : esc(site.name);

    // 
    let barStyle = '';
    let barLabel = '';
    if (site.startDate && site.endDate) {
      const sD = new Date(site.startDate); sD.setHours(0,0,0,0);
      const eD = new Date(site.endDate);   eD.setHours(0,0,0,0);
      const startIdx = days.findIndex(d=>d.getTime()===sD.getTime());
      const endIdx   = days.findIndex(d=>d.getTime()===eD.getTime());
      if (startIdx>=0 && endIdx>=0) {
        const left = startIdx * 24;
        const width = (endIdx - startIdx + 1) * 24;
        barStyle = `left:${left}px;width:${width}px;background:${color};`;
        barLabel = nameHtml;
      }
    }

    // td
    const cells = days.map((d,i) => {
      const isToday = d.getTime()===today.getTime();
      const isFirst = d.getDate()===1;
      return `<td class="gantt-cell${isToday?' today-col':''}${isFirst?' month-start':''}"><\/td>`;
    }).join('');

    // first tdabsolutetddiv  tablewrapper
    return `<tr class="gantt-row">
      <td class="gantt-label" onclick="openSite(${site.id})" title="${esc(site.name)}">${nameHtml}<\/td>
      <td colspan="${totalDays}" style="position:relative;padding:0;height:30px;">
        <div style="display:flex;height:100%;">
          ${days.map((d,i)=>{
            const isToday=d.getTime()===today.getTime();
            const isFirst=d.getDate()===1;
            return `<div style="width:24px;min-width:24px;height:100%;border-left:1px solid ${isFirst?'#334155':'#1e2235'};background:${isToday?'#f59e0b08':'transparent'};flex-shrink:0;position:relative;"><\/div>`;
          }).join('')}
        <\/div>
        ${barStyle ? `<div class="gantt-bar" style="${barStyle}">${barLabel}<\/div>` : ''}
        ${(() => {
          // today line
          const ti = days.findIndex(d=>d.getTime()===today.getTime());
          if (ti<0) return '';
          return `<div style="position:absolute;top:0;bottom:0;left:${ti*24+12}px;width:2px;background:#f59e0b;opacity:.5;pointer-events:none;"><\/div>`;
        })()}
      <\/td>
    <\/tr>`;
  }).join('');

  return `
  <div style="background:#1a1d2e;border-radius:12px;padding:12px 12px 8px;">
    <div class="gantt-wrap">
      <table class="gantt-table" style="table-layout:fixed;">
        <thead>
          <tr>
            <th style="width:130px;min-width:130px;"><\/th>
            ${headCells}
          <\/tr>
        <\/thead>
        <tbody>${rows}<\/tbody>
      <\/table>
    <\/div>
    <div style="display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;">
      ${['進行中','予定','完了','中断'].map(s=>`
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#94a3b8;">
          <div style="width:10px;height:10px;border-radius:2px;background:${STATUS_COLOR[s]};"><\/div>
          ${sl(s)}
        <\/div>`).join('')}
      <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#94a3b8;">
        <div style="width:10px;height:10px;border-radius:1px;background:#f59e0b;opacity:.5;"><\/div>
        ${state.lang==='en'?'Today':'今日'}
      <\/div>
    <\/div>
  <\/div>`;
}

function renderSiteDetail(site) {
  const prog = site.tasks.length ? Math.round(site.tasks.filter(tk=>tk.done).length/site.tasks.length*100) : 0;
  const color = siteColor(site.status);
  const label = sl(site.status);
  const nameHtml = state.lang==='en'
    ? (site.translating ? `<span class="translating">🔄 ${t().translating}<\/span>` : esc(site.nameEn||site.name))
    : esc(site.name);
  return `
  <button style="background:none;border:none;color:#f59e0b;cursor:pointer;font-size:14px;margin-bottom:12px;padding:0;display:flex;align-items:center;gap:4px;"
    onclick="goBack()">${t().backToList}<\/button>
  <div style="background:linear-gradient(135deg,#1e2235,#161926);border-radius:12px;padding:16px;margin-bottom:14px;border-left:4px solid ${color};">
    <div style="display:flex;justify-content:space-between;">
      <h2 style="font-size:16px;font-weight:800;flex:1;margin-right:8px;">${nameHtml}<\/h2>
      <span class="chip" style="background:${color}22;color:${color};">${esc(label)}<\/span>
    <\/div>
    <div style="font-size:12px;color:#64748b;margin:6px 0;">📍 ${esc(site.location)}<\/div>
    <div style="font-size:12px;color:#64748b;margin-bottom:10px;">📅 ${esc(site.startDate)} – ${esc(site.endDate)}<\/div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
      <span>${t().progress}<\/span><span style="font-weight:700;color:#f59e0b;">${prog}%</span>
    <\/div>
    <div class="progress-bar" style="height:8px;">
      <div class="progress-fill" style="width:${prog}%;background:linear-gradient(90deg,#f59e0b,#f97316);"><\/div>
    <\/div>
  <\/div>
  <div class="subtab-bar">
    <button class="subtab-btn ${state.siteSubTab==='tasks'?'active':''}" onclick="setSiteSubTab('tasks')">
      📋 ${state.lang==='en'?'Tasks':'作業タスク'}
    <\/button>
    <button class="subtab-btn ${state.siteSubTab==='tools'?'active':''}" onclick="setSiteSubTab('tools')">
      🔧 ${state.lang==='en'?'Tools':'必要道具'}
    <\/button>
  <\/div>
  ${state.siteSubTab==='tasks' ? renderTaskList(site) : renderSiteToolList(site)}`;
}

function renderTaskList(site) {
  return `
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <input id="task-input" placeholder="${t().taskPh}"
      onkeydown="if(event.key==='Enter')submitTask(${site.id})" style="flex:1;">
    <button class="btn-primary" onclick="submitTask(${site.id})">${t().addTaskBtn}<\/button>
  <\/div>
  ${site.tasks.map(task => {
    if (state.confirmDeleteTask===task.id) return `
      <div class="confirm-bar">
        <span style="font-size:13px;color:#fca5a5;">${t().delConfirm}<\/span>
        <div style="display:flex;gap:6px;">
          <button style="padding:5px 12px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;"
            onclick="setConfirmDeleteTask(null)">${t().cancel}<\/button>
          <button style="padding:5px 12px;border-radius:6px;border:none;background:#ef4444;color:#fff;cursor:pointer;font-size:12px;font-weight:700;"
            onclick="deleteTask(${site.id},${task.id})">${t().del}<\/button>
        <\/div>
      <\/div>`;
    if (state.editingTask===task.id) return `
      <div class="edit-bar">
        <input id="edit-task-input" value="${esc(state.lang==='en'?(task.textEn||task.text):task.text)}"
          onkeydown="if(event.key==='Enter')saveTaskEdit(${site.id},${task.id});if(event.key==='Escape'){state.editingTask=null;render();}"
          style="flex:1;padding:6px 10px;">
        <button class="btn-primary" style="padding:6px 12px;font-size:12px;"
          onclick="saveTaskEdit(${site.id},${task.id})">${t().save}<\/button>
        <button style="padding:6px 10px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;"
          onclick="setEditingTask(null)">${t().cancel}<\/button>
      <\/div>`;
    return `
      <div class="task-row" style="background:${task.done?'#0d1f0d':'#1a1d2e'};border:1px solid ${task.done?'#22c55e33':'#ffffff11'};">
        <div class="checkbox ${task.done?'done':''}" onclick="toggleTask(${site.id},${task.id})">${task.done?'✓':''}<\/div>
        <span style="flex:1;font-size:14px;font-weight:500;text-decoration:${task.done?'line-through':'none'};color:${task.done?'#475569':'#e8eaf0'};">
          ${textDisplay(task)}
        <\/span>
        ${task.assignee?`<span style="font-size:11px;color:#94a3b8;background:#1e2235;padding:2px 8px;border-radius:20px;white-space:nowrap;">${esc(task.assignee)}<\/span>`:''}
        <div style="display:flex;gap:4px;flex-shrink:0;">
          <button class="btn-icon" onclick=\"setEditingTask(\${task.id})\" title="${t().edit}">✏️<\/button>
          <button class="btn-icon danger" onclick=\"setConfirmDeleteTask(\${task.id})\" title="${t().del}">🗑<\/button>
        <\/div>
      <\/div>`;
  }).join('')}`;
}

function renderSiteToolList(site) {
  const needs = site.toolNeeds||[];
  const addedIds = new Set(needs.map(n=>n.toolId));
  const avail = state.tools.filter(tl=>!addedIds.has(tl.id));
  if (!state.tools.length) return `<div class="empty-state"><div style="font-size:30px;margin-bottom:8px;">🔧<\/div><div style="color:#64748b;font-size:13px;">${t().toolMasterEmpty}</div><\/div>`;
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <span style="font-size:13px;color:#94a3b8;">${t().siteToolsDesc}<\/span>
    ${avail.length?`<button class="btn-secondary" onclick="openModal('addSiteTool')">${t().addSiteTool}<\/button>`:''}
  <\/div>
  ${!needs.length ? `<div class="empty-state"><div style="font-size:30px;margin-bottom:8px;">📦<\/div>
    <div style="color:#64748b;font-size:13px;margin-bottom:12px;">${t().noSiteTools}<\/div>
    ${avail.length?`<button class="btn-primary" onclick="openModal('addSiteTool')">${t().addSiteTool}<\/button>`:''}</div>` :
  needs.map(need => {
    const tm = toolById(need.toolId);
    if (!tm) return '';
    if (state.confirmDeleteNeed===need.id) return `
      <div class="confirm-bar">
        <span style="font-size:13px;color:#fca5a5;">${t().delConfirm}<\/span>
        <div style="display:flex;gap:6px;">
          <button style="padding:5px 12px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;"
            onclick="setConfirmDeleteNeed(null)">${t().cancel}<\/button>
          <button style="padding:5px 12px;border-radius:6px;border:none;background:#ef4444;color:#fff;cursor:pointer;font-size:12px;font-weight:700;"
            onclick="deleteSiteToolNeed(${site.id},${need.id})">${t().del}<\/button>
        <\/div>
      <\/div>`;
    return `
      <div class="card" style="display:flex;align-items:center;gap:12px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#1e2a1e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🔧<\/div>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:14px;">${nameDisplay(tm)}<\/div>
          ${tm.category?`<div style="font-size:12px;color:#64748b;">${esc(tm.category)}<\/div>`:''}
          ${need.note?`<div style="font-size:12px;color:#94a3b8;margin-top:2px;">📝 ${esc(need.note)}<\/div>`:''}
        <\/div>
        <div style="text-align:right;margin-right:8px;">
          <div style="font-size:20px;font-weight:900;color:#f59e0b;">${need.qty}<\/div>
          <div style="font-size:10px;color:#64748b;">${t().needed}<\/div>
        <\/div>
        <button class="btn-icon danger" onclick=\"setConfirmDeleteNeed(\${need.id})\">🗑<\/button>
      <\/div>`;
  }).join('')}`;
}

// -------------------------------------------------------------
// TOOLS MASTER
// -------------------------------------------------------------
function renderTools() {
  const cats = [...new Set(state.tools.map(tl=>tl.category).filter(Boolean))];
  const filtered = state.toolFilter==='__all__' ? state.tools : state.tools.filter(tl=>tl.category===state.toolFilter);
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h2 class="section-title">${t().toolsMgmt}<\/h2>
    <button class="btn-primary" onclick="openModal('addTool')">${t().addTool}<\/button>
  <\/div>
  ${!state.tools.length ? `<div class="empty-state">
    <div style="font-size:36px;margin-bottom:12px;">🔧<\/div>
    <div style="color:#94a3b8;font-size:14px;margin-bottom:16px;">${t().noTools}<\/div>
    <button class="btn-primary" onclick="openModal('addTool')">${t().addTool}<\/button>
  <\/div>` : `
  ${cats.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
    <button class="filter-btn ${state.toolFilter==='__all__'?'active':''}" onclick="setToolFilter('__all__')">${t().all}<\/button>
    ${cats.map(c=>`<button class="filter-btn ${state.toolFilter===c?'active':''}" onclick=\"setToolFilter('${esc(c)}')\">${esc(c)}<\/button>`).join('')}
  <\/div>`:''}
  <div>
  ${filtered.map(tool => {
    if (state.confirmDeleteTool===tool.id) return `
      <div class="confirm-bar" style="border-radius:10px;margin-bottom:8px;">
        <span style="font-size:13px;color:#fca5a5;">${t().delToolConfirm}<\/span>
        <div style="display:flex;gap:6px;">
          <button style="padding:5px 12px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;"
            onclick="setConfirmDeleteTool(null)">${t().cancel}<\/button>
          <button style="padding:5px 12px;border-radius:6px;border:none;background:#ef4444;color:#fff;cursor:pointer;font-size:12px;font-weight:700;"
            onclick="deleteTool(${tool.id})">${t().del}<\/button>
        <\/div>
      <\/div>`;

    return `
      <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#1e2a1e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🔧<\/div>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:14px;">${nameDisplay(tool)}<\/div>
          ${tool.category?`<div style="font-size:12px;color:#64748b;">${esc(tool.category)}<\/div>`:''}
        <\/div>
        <div style="text-align:right;margin-right:8px;">
          <div style="font-size:18px;font-weight:900;color:#e8eaf0;">${tool.count}<\/div>
          <div style="font-size:10px;color:#64748b;">${t().total}<\/div>
        <\/div>
        <div style="display:flex;gap:4px;flex-shrink:0;">
          <button class="btn-icon" onclick=\"setEditingTool(\${tool.id})\">✏️<\/button>
          <button class="btn-icon danger" onclick=\"setConfirmDeleteTool(\${tool.id})\">🗑<\/button>
        <\/div>
      <\/div>`;
  }).join('')}
  <\/div>`}`;
}

// -------------------------------------------------------------
// MODAL
// -------------------------------------------------------------
function renderModal() {
  let existing = document.getElementById('modal-container');
  if (existing) existing.remove();
  if (!state.modal) return;
  const div = document.createElement('div');
  div.id = 'modal-container';
  div.className = 'modal-backdrop';
  div.onclick = e => { if(e.target===div){ closeModal(); } };

  let inner = '';
  if (state.modal==='addSite') {
    const statuses = ['予定','進行中','完了','中断'];
    inner = `<h3 style="margin:0 0 16px;font-size:16px;font-weight:800;">${t().addSiteTitle}<\/h3>
    <div class="field"><label class="field-label">${t().siteName}<\/label>
      <input id="m-name" placeholder="${t().siteNamePh}"><\/div>
    <div class="field"><label class="field-label">${t().address}<\/label>
      <input id="m-location" placeholder="${t().addressPh}"><\/div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
      <div><label class="field-label">${t().startDate}<\/label><input id="m-start" type="date"></div>
      <div><label class="field-label">${t().endDate}<\/label><input id="m-end" type="date"></div>
    <\/div>
    <div class="field"><label class="field-label">${t().status}<\/label>
      <select id="m-status">${statuses.map(s=>`<option value="${s}">${state.lang==='en'?t().types[s]:s}<\/option>`).join('')}</select><\/div>
    <button class="btn-primary" style="width:100%;margin-top:4px;" onclick="submitSite()">${t().add}<\/button>`;
  } else if (state.modal==='addTool') {
    inner = `<h3 style="margin:0 0 16px;font-size:16px;font-weight:800;">${t().addToolTitle}<\/h3>
    <div class="field"><label class="field-label">${t().toolName}<\/label>
      <input id="m-tname" placeholder="${t().toolNamePh}"><\/div>
    <div class="field"><label class="field-label">${t().category}<\/label>
      <input id="m-tcat" placeholder="${t().categoryPh}"><\/div>
    <div class="field"><label class="field-label">${t().total}<\/label>
      <input id="m-tcount" type="number" min="1" value="1" style="width:120px;"><\/div>
    <button class="btn-primary" style="width:100%;margin-top:4px;" onclick="submitTool()">${t().register}<\/button>`;
  } else if (state.modal==='addSiteTool') {
    const site = siteById(state.selectedSite);
    if (!site) return;
    const addedIds = new Set((site.toolNeeds||[]).map(n=>n.toolId));
    const avail = state.tools.filter(tl=>!addedIds.has(tl.id));
    inner = `<h3 style="margin:0 0 16px;font-size:16px;font-weight:800;">${t().addSiteTool}<\/h3>
    <div class="field"><label class="field-label">${t().selectTool}<\/label>
      <select id="m-stool">
        <option value="">${state.lang==='en'?'-- Select --':'-- 選択してください --'}<\/option>
        ${avail.map(tl=>`<option value="${tl.id}">${state.lang==='en'?(tl.nameEn||tl.name):tl.name}${tl.category?` (${tl.category})`:''}<\/option>`).join('')}
      <\/select></div>
    <div class="field"><label class="field-label">${t().qty}<\/label>
      <input id="m-sqty" type="number" min="1" value="1" style="width:120px;"><\/div>
    <div class="field"><label class="field-label">${t().note}<\/label>
      <input id="m-snote" placeholder="${t().notePh}"><\/div>
    <button class="btn-primary" style="width:100%;margin-top:4px;" onclick="submitSiteTool()">${t().addToSite}<\/button>`;
  } else if (state.modal==='editTool') {
    const tool = state.tools.find(x=>x.id===state.editingTool);
    if (!tool) return;
    inner = `<h3 style="margin:0 0 16px;font-size:16px;font-weight:800;">${t().editToolTitle}<\/h3>
    <div class="field"><label class="field-label">${t().toolName}<\/label>
      <input id="et-name" value="${esc(tool.name)}" placeholder="${t().toolNamePh}"><\/div>
    <div class="field"><label class="field-label">${t().category}<\/label>
      <input id="et-cat" value="${esc(tool.category||'')}" placeholder="${t().categoryPh}"><\/div>
    <div class="field"><label class="field-label">${t().total}<\/label>
      <input id="et-count" type="number" min="1" value="${tool.count}" style="width:120px;"><\/div>
    <button class="btn-primary" style="width:100%;margin-top:4px;" onclick="saveToolEdit(${tool.id})">${t().save}<\/button>`;
  } else if (state.modal==='editSite') {
    const site = siteById(state.editingSite);
    if (!site) return;
    const statuses = ['予定','進行中','完了','中断'];
    inner = `<h3 style="margin:0 0 16px;font-size:16px;font-weight:800;">${t().editSite}<\/h3>
    <div class="field"><label class="field-label">${t().siteName}<\/label>
      <input id="es-name" value="${esc(site.name)}" placeholder="${t().siteNamePh}"><\/div>
    <div class="field"><label class="field-label">${t().address}<\/label>
      <input id="es-location" value="${esc(site.location)}" placeholder="${t().addressPh}"><\/div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
      <div><label class="field-label">${t().startDate}<\/label><input id="es-start" type="date" value="${esc(site.startDate||'')}"></div>
      <div><label class="field-label">${t().endDate}<\/label><input id="es-end" type="date" value="${esc(site.endDate||'')}"></div>
    <\/div>
    <div class="field"><label class="field-label">${t().status}<\/label>
      <select id="es-status">${statuses.map(s=>`<option value="${s}" ${site.status===s?'selected':''}>${state.lang==='en'?t().types[s]:s}<\/option>`).join('')}</select><\/div>
    <button class="btn-primary" style="width:100%;margin-top:4px;" onclick="saveEditSite()">${t().saveSite}<\/button>`;
  }

  div.innerHTML = `<div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span><\/span>
      <button onclick="closeModal()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:20px;">×<\/button>
    <\/div>
    ${inner}
  <\/div>`;
  document.body.appendChild(div);
}

function renderPwa() {
  let existing = document.getElementById('pwa-modal');
  if (existing) existing.remove();
  if (!state.showPwa) return;
  const div = document.createElement('div');
  div.id = 'pwa-modal';
  div.className = 'modal-backdrop';
  div.onclick = e => { if(e.target===div){togglePwa(); } };
  div.innerHTML = `<div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="margin:0;font-size:16px;font-weight:800;">📱 ${t().pwaTitle}<\/h3>
      <button onclick="togglePwa()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:20px;">×<\/button>
    <\/div>
    <div style="background:#1e2235;border-radius:10px;padding:14px;margin-bottom:12px;">
      <div style="font-size:13px;color:#94a3b8;margin-bottom:6px;">🍎 ${t().pwaIos}<\/div>
    <\/div>
    <div style="background:#1e2235;border-radius:10px;padding:14px;">
      <div style="font-size:13px;color:#94a3b8;">🤖 ${t().pwaAndroid}<\/div>
    <\/div>
  <\/div>`;
  document.body.appendChild(div);
}

// -------------------------------------------------------------
// ACTIONS
// -------------------------------------------------------------
function setLang(l) { state.lang=l; render(); }
function setTab(tab) { state.tab=tab; state.selectedSite=null; state.modal=null; render(); }
function openSite(id) { state.selectedSite=id; state.tab='sites'; state.siteSubTab='tasks'; render(); }
function setSiteSubTab(tab) { state.siteSubTab=tab; state.confirmDeleteNeed=null; render(); }
function openModal(m) { state.modal=m; render(); }
function togglePwa() { state.showPwa=!state.showPwa; render(); }

function saveSenderName(v) {
  state.senderName = v.trim();
  localStorage.setItem('tcrest-sender', state.senderName);
  // re-render
  const btn = document.getElementById('notice-send-btn');
  const warn = document.getElementById('sender-warn');
  if(btn) {
    btn.disabled = !state.senderName;
    btn.style.opacity = state.senderName ? '1' : '0.5';
    btn.style.cursor = state.senderName ? 'pointer' : 'not-allowed';
  }
  if(warn) warn.style.display = state.senderName ? 'none' : 'block';
}
function toggleNoticePin(id) {
  const n = state.notices.find(x=>x.id===id);
  if(n){ n.important=!n.important; syncToShared(); render(); }
}
function deleteNotice(id) {
  const n = state.notices.find(x=>x.id===id);
  if(n && n.important) return; // 
  state.notices = state.notices.filter(x=>x.id!==id);
  state.confirmDeleteNotice=null;
  syncToShared(); render();
}
function openEditSite(id) { state.editingSite=id; state.modal='editSite'; render(); }
function toggleSitePin(id) {
  const s = state.sites.find(x=>x.id===id);
  if(s){ s.pinned=!s.pinned; syncToShared(); render(); }
}
function deleteSite(id) {
  const s = state.sites.find(x=>x.id===id);
  if(s && s.pinned) return;
  state.sites = state.sites.filter(x=>x.id!==id);
  state.confirmDeleteSite=null;
  if(state.selectedSite===id) state.selectedSite=null;
  syncToShared(); render();
}
function toggleTaskPin(siteId, taskId) {
  const site = siteById(siteId);
  const task = site?.tasks.find(x=>x.id===taskId);
  if(task){ task.pinned=!task.pinned; syncToShared(); render(); }
}
function toggleToolPin(id) {
  const tl = state.tools.find(x=>x.id===id);
  if(tl){ tl.pinned=!tl.pinned; syncToShared(); render(); }
}
function startNoticeEdit(id) { state.editingNotice=id; render(); }
function cancelNoticeEdit() { state.editingNotice=null; render(); }
async function saveNoticeEdit(id) {
  const el = document.getElementById('edit-notice-input-'+id);
  const txt = el?.value.trim();
  if(!txt) return;
  const n = state.notices.find(x=>x.id===id);
  if(!n) return;
  n.text=txt; n.textEn='...'; n.translating=true;
  state.editingNotice=null;
  await syncToShared(); render();
  const textEn = await translateToEn(txt);
  n.textEn=textEn; n.translating=false;
  await syncToShared(); render();
}
function openEditTool(id) { state.editingTool=id; state.modal='editTool'; render(); }
async function saveEditSite() {
  const site = siteById(state.editingSite);
  if(!site) return;
  const name = document.getElementById('es-name')?.value.trim();
  if(!name) return;
  const oldName = site.name;
  site.name = name;
  site.location = document.getElementById('es-location')?.value.trim()||site.location;
  site.startDate = document.getElementById('es-start')?.value||site.startDate;
  site.endDate = document.getElementById('es-end')?.value||site.endDate;
  site.status = document.getElementById('es-status')?.value||site.status;
  state.modal=null;
  if(name !== oldName){ site.nameEn='…'; site.translating=true; }
  await syncToShared(); render();
  if(name !== oldName){
    const nameEn = await translateToEn(name);
    site.nameEn=nameEn; site.translating=false;
    await syncToShared(); render();
  }
}

async function submitNotice() {
  const el = document.getElementById('notice-input');
  const txt = el ? el.value.trim() : state.newNotice.trim();
  if (!txt) return;
  const id = Date.now();
  const now = new Date();
  const timeStr = state.lang==='en'
    ? now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})
    : `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const from = state.senderName || (state.lang==='en'?'Unknown':'名無し');
  state.notices.unshift({id,from,text:txt,textEn:'…',time:timeStr,important:false,translating:true});
  state.newNotice='';
  await syncToShared(); render();
  const textEn = await translateToEn(txt);
  const n = state.notices.find(x=>x.id===id);
  if(n){n.textEn=textEn;n.translating=false;}
  await syncToShared(); render();
}

async function submitSite() {
  const name = document.getElementById('m-name')?.value.trim();
  if (!name) return;
  const id = Date.now();
  state.sites.push({
    id, name, nameEn:'…',
    location: document.getElementById('m-location')?.value.trim()||'',
    startDate: document.getElementById('m-start')?.value||'',
    endDate: document.getElementById('m-end')?.value||'',
    status: document.getElementById('m-status')?.value||'予定',
    tasks:[], toolNeeds:[], translating:true
  });
  state.modal=null;
  await syncToShared(); render();
  const nameEn = await translateToEn(name);
  const s = state.sites.find(x=>x.id===id);
  if(s){s.nameEn=nameEn;s.translating=false;}
  await syncToShared(); render();
}

async function submitTool() {
  const name = document.getElementById('m-tname')?.value.trim();
  if (!name) return;
  const id = Date.now();
  state.tools.push({
    id, name, nameEn:'…',
    category: document.getElementById('m-tcat')?.value.trim()||'',
    count: Number(document.getElementById('m-tcount')?.value)||1,
    translating:true
  });
  state.modal=null;
  await syncToShared(); render();
  const nameEn = await translateToEn(name);
  const tl = state.tools.find(x=>x.id===id);
  if(tl){tl.nameEn=nameEn;tl.translating=false;}
  await syncToShared(); render();
}

async function saveToolEdit(id) {
  const name = document.getElementById('et-name')?.value.trim();
  const cat  = document.getElementById('et-cat')?.value.trim();
  const count= Number(document.getElementById('et-count')?.value)||1;
  if(!name) return;
  const tl = state.tools.find(x=>x.id===id);
  if(!tl) return;
  const oldName = tl.name;
  Object.assign(tl,{name,category:cat,count});
  state.modal=null; state.editingTool=null;
  if(name!==oldName){ tl.nameEn='…'; tl.translating=true; }
  await syncToShared(); render();
  if(name!==oldName){
    const nameEn = await translateToEn(name);
    tl.nameEn=nameEn; tl.translating=false;
    await syncToShared(); render();
  }
}

function deleteTool(id) {
  state.tools = state.tools.filter(x=>x.id!==id);
  state.sites.forEach(s=>{ s.toolNeeds=(s.toolNeeds||[]).filter(n=>n.toolId!==id); });
  state.confirmDeleteTool=null;
  syncToShared(); render();
}

async function submitTask(siteId) {
  const el = document.getElementById('task-input');
  const txt = el?.value.trim();
  if (!txt) return;
  const id = Date.now();
  const site = siteById(siteId);
  if(!site) return;
  site.tasks.push({id,text:txt,textEn:'…',done:false,assignee:'',translating:true});
  if(el) el.value='';
  await syncToShared(); render();
  const textEn = await translateToEn(txt);
  const task = site.tasks.find(x=>x.id===id);
  if(task){task.textEn=textEn;task.translating=false;}
  await syncToShared(); render();
}

async function saveTaskEdit(siteId, taskId) {
  const el = document.getElementById('edit-task-input');
  const txt = el?.value.trim();
  if(!txt) return;
  const site = siteById(siteId);
  const task = site?.tasks.find(x=>x.id===taskId);
  if(!task) return;
  task.text=txt; task.textEn='…'; task.translating=true;
  state.editingTask=null;
  await syncToShared(); render();
  const textEn = await translateToEn(txt);
  task.textEn=textEn; task.translating=false;
  await syncToShared(); render();
}

function toggleTask(siteId, taskId) {
  const site = siteById(siteId);
  const task = site?.tasks.find(x=>x.id===taskId);
  if(task){ task.done=!task.done; syncToShared(); render(); }
}

function deleteTask(siteId, taskId) {
  const site = siteById(siteId);
  if(!site) return;
  site.tasks = site.tasks.filter(x=>x.id!==taskId);
  state.confirmDeleteTask=null;
  syncToShared(); render();
}

function submitSiteTool() {
  const toolId = Number(document.getElementById('m-stool')?.value);
  if(!toolId) return;
  const site = siteById(state.selectedSite);
  if(!site) return;
  site.toolNeeds = site.toolNeeds||[];
  site.toolNeeds.push({
    id:Date.now(), toolId,
    qty: Number(document.getElementById('m-sqty')?.value)||1,
    note: document.getElementById('m-snote')?.value.trim()||'',
  });
  state.modal=null;
  syncToShared(); render();
}

function deleteSiteToolNeed(siteId, needId) {
  const site = siteById(siteId);
  if(!site) return;
  site.toolNeeds = (site.toolNeeds||[]).filter(x=>x.id!==needId);
  state.confirmDeleteNeed=null;
  syncToShared(); render();
}

// -------------------------------------------------------------
// INIT
// -------------------------------------------------------------
// type="module"
// onclickwindow
Object.assign(window, {
  setLang, setTab, openSite, setSiteSubTab, openModal, togglePwa,
  toggleNoticePin, deleteNotice, openEditSite, saveEditSite, saveSenderName, openEditTool,
  toggleSitePin, deleteSite, toggleTaskPin, toggleToolPin,
  startNoticeEdit, cancelNoticeEdit, saveNoticeEdit,
  setConfirmDeleteSite: (v) => { state.confirmDeleteSite=v; render(); },
  setConfirmDeleteNotice: (v) => { state.confirmDeleteNotice=v; render(); },
  submitNotice, submitSite, submitTool, saveToolEdit, deleteTool,
  submitTask, saveTaskEdit, toggleTask, deleteTask,
  submitSiteTool, deleteSiteToolNeed,
  render,
  // state
  closeModal: () => { state.modal=null; render(); },
  setToolFilter: (v) => { state.toolFilter=v; render(); },
  setSiteView: (v) => { state.siteView=v; render(); },
  setConfirmDeleteTask: (v) => { state.confirmDeleteTask=v; render(); },
  setEditingTask: (v) => { state.editingTask=v; render(); },
  setConfirmDeleteTool: (v) => { state.confirmDeleteTool=v; render(); },
  setEditingTool: (v) => { state.editingTool=v; render(); },
  setConfirmDeleteNeed: (v) => { state.confirmDeleteNeed=v; render(); },
  goBack: () => { state.selectedSite=null; render(); },
});

function init() {
  render(); // 
  startRealtimeSync(); // Firebase
}

init();
</script>
</body>
